<div class="auth-container">
  <div class="auth-card">
    <h1>Welcome Back</h1>
    <p>Sign in to continue chatting with AI personas</p>

    <!-- Demo Accounts Section -->
    <div class="demo-section">
      <h3>Demo Accounts</h3>
      
      <div class="account-category">
        <h4>Regular Users</h4>
        <div class="demo-accounts">
          <div class="demo-account" (click)="fillDemoAccount('demo@example.com', 'password123')">
            <strong>demo@example.com</strong>
            <span>password123</span>
          </div>
          <div class="demo-account" (click)="fillDemoAccount('john@test.com', 'test123')">
            <strong>john@test.com</strong>
            <span>test123</span>
          </div>
        </div>
      </div>

      <div class="account-category">
        <h4>Admin Users</h4>
        <div class="demo-accounts">
          <div class="demo-account admin-account" (click)="fillDemoAccount('admin@titantalk.com', 'admin123')">
            <strong>admin@titantalk.com</strong>
            <span>admin123</span>
            <span class="admin-badge">ADMIN</span>
          </div>
        </div>
      </div>
    </div>

    <form (ngSubmit)="onSubmit()" #loginForm="ngForm" (submit)="$event.preventDefault(); onSubmit()">
      <div class="form-group">
        <label for="email">Email</label>
        <input
          type="email"
          id="email"
          [(ngModel)]="loginData.email"
          name="email"
          placeholder="Enter your email"
          required
          [disabled]="isLoading">
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input
          type="password"
          id="password"
          [(ngModel)]="loginData.password"
          name="password"
          placeholder="Enter your password"
          required
          [disabled]="isLoading">
      </div>

      @if (errorMessage) {
        <div class="error-message">
          {{ errorMessage }}
        </div>
      }

      <button
        type="button"
        class="auth-btn"
        (click)="onSubmit()"
        [disabled]="!isFormValid() || isLoading">
        @if (isLoading) {
          <span class="loading-spinner">⟳</span>
          <span>Signing in...</span>
        } @else {
          <span>Sign In</span>
        }
      </button>
    </form>

    <div class="auth-footer">
      <p>
        <span>Don't have an account?</span>
        <button type="button" class="link-btn" (click)="goToRegister()" [disabled]="isLoading">
          <span>Create one</span>
        </button>
      </p>
    </div>
  </div>
</div>
