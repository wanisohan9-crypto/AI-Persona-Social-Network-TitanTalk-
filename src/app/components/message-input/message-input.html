@if (selectedChat) {
  <div class="message-input-container">
    @if (isTyping) {
      <div class="typing-indicator">
        <span class="avatar">{{ selectedChat.avatar }}</span>
        <span class="typing-text">{{ selectedChat.name }} is typing...</span>
        <div class="typing-dots">
          <span></span>
          <span></span>
          <span></span>
        </div>
      </div>
    }

    <div class="input-wrapper">
      <textarea
        [(ngModel)]="newMessage"
        (keydown)="onKeyPress($event)"
        placeholder="Type a message to {{ selectedChat.name }}..."
        class="message-input"
        rows="1"
      ></textarea>
      <button (click)="sendMessage()" [disabled]="!newMessage.trim()" class="send-button">
        <span class="send-icon">➤</span>
      </button>
    </div>
  </div>
}
